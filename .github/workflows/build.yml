name: Build KivyMD App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Auto accept licenses
      run: |
        # Принимаем все лицензии
        yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses || true
        mkdir -p ~/.buildozer
        echo "yes" > ~/.buildozer/accept_sdk_license
    
    - name: Create minimal config
      run: |
        cat > buildozer.spec << 'EOF'
[app]
title = My App
package.name = myapp
package.domain = com.example
requirements = python3,kivy==2.1.0,kivymd==1.1.1,pyjnius,android,openssl,pillow

[buildozer]
log_level = 2

[android]
api = 30
minapi = 21
ndk = 23b
android.accept_sdk_license = True
EOF
    
    - name: Build
      run: |
        # Автоматически подтверждаем все запросы
        yes | buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: bin/*.apk
        if-no-files-found: warn
        retention-days: 30
