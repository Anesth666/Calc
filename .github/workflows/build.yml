name: Build KivyMD App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Auto accept licenses
      run: |
        yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses || true
        mkdir -p ~/.buildozer
        echo "yes" > ~/.buildozer/accept_sdk_license
    
    - name: Create buildozer.spec
      run: |
        printf '[app]\n' > buildozer.spec
        printf 'title = My App\n' >> buildozer.spec
        printf 'package.name = myapp\n' >> buildozer.spec
        printf 'package.domain = com.example\n' >> buildozer.spec
        printf 'requirements = python3,kivy==2.1.0,kivymd==1.1.1,pyjnius,android,openssl,pillow\n' >> buildozer.spec
        printf '\n[android]\n' >> buildozer.spec
        printf 'api = 30\n' >> buildozer.spec
        printf 'minapi = 21\n' >> buildozer.spec
        printf 'ndk = 23b\n' >> buildozer.spec
        printf 'android.accept_sdk_license = True\n' >> buildozer.spec
    
    - name: Build
      run: yes | buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: bin/*.apk
