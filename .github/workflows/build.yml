name: Build KivyMD for Android

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          python3-pip \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses-dev \
          libncursesw5-dev \
          cmake \
          libffi-dev \
          libssl-dev \
          autoconf \
          automake \
          ccache \
          gettext

    - name: Fix for libtinfo5 (Ubuntu 22.04+)
      run: |
        # Скачиваем libtinfo5 из старого репозитория
        wget http://archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb
        sudo dpkg -i libtinfo5_6.3-2ubuntu0.1_amd64.deb
        # Игнорируем ошибки зависимостей, так как они уже установлены
        sudo apt-get install -f -y

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install cython==0.29.36
        pip install buildozer

    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.cache/pip
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}

    - name: Create or update buildozer.spec
      run: |
        if [ ! -f buildozer.spec ]; then
          buildozer init
        fi
        
        # Обновляем конфигурацию для KivyMD
        sed -i 's/^requirements =.*/requirements = python3,kivy==2.1.0,kivymd==1.1.1,pyjnius,android,openssl,pillow,requests,docutils,pygments/' buildozer.spec
        sed -i 's/^package.name =.*/package.name = mykivymdapp/' buildozer.spec
        sed -i 's/^package.domain =.*/package.domain = org.example/' buildozer.spec
        sed -i 's/^android.api =.*/android.api = 30/' buildozer.spec
        sed -i 's/^android.minapi =.*/android.minapi = 21/' buildozer.spec
        sed -i 's/^android.ndk =.*/android.ndk = 25b/' buildozer.spec
        sed -i 's/^android.sdk =.*/android.sdk = 30/' buildozer.spec
        sed -i 's/^#android.permissions =.*/android.permissions = INTERNET,WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE/' buildozer.spec
        sed -i 's/^#android.gradle_dependencies =.*/android.gradle_dependencies = androidx.recyclerview:recyclerview:1.2.1,com.google.android.material:material:1.6.1/' buildozer.spec
        sed -i 's/^#android.add_src =.*/android.add_src = jni/' buildozer.spec

    - name: Build with Buildozer
      run: |
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-${{ github.sha }}
        path: bin/*.apk
        retention-days: 30

    - name: Upload build logs if failed
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: ~/.buildozer/android/platform/build-*/logs/
        retention-days: 7
